<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sale Order Form — Skyline Beauty Supply</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --white:        #ffffff;
      --off-white:    #faf9fb;
      --soft-lilac:   #f4f0f8;
      --pale-purple:  #ede5f5;
      --purple-main:  #b565d0;
      --purple-deep:  #8e3db0;
      --purple-light: #d49de8;
      --purple-glow:  #c078d8;
      --silver:       #c8c4cc;
      --silver-light: #e8e4ec;
      --charcoal:     #3a2d42;
      --text-body:    #4a3d54;
      --text-muted:   #9a88a8;
      --border:       rgba(176,120,210,0.18);
      --border-mid:   rgba(176,120,210,0.32);
      --shadow-card:  0 20px 80px rgba(140,80,180,0.12), 0 4px 16px rgba(140,80,180,0.07);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--off-white);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow-x: hidden;
    }

    /* Background gradient mesh */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 0% 0%,   rgba(192,120,216,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 100% 100%, rgba(142,61,176,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 50%,  rgba(212,157,232,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle dot grid */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(rgba(160,100,200,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* Decorative corner frames */
    .corner {
      position: fixed; pointer-events: none; z-index: 0;
      opacity: 0.22;
    }
    .corner-tl { top: 0; left: 0; }
    .corner-br { bottom: 0; right: 0; transform: rotate(180deg); }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; padding: 48px 20px;
    }

    /* ── Logo ── */
    .logo-block {
      text-align: center;
      margin-bottom: 36px;
      animation: riseIn 0.9s cubic-bezier(.22,.68,0,1.2) both;
    }

    .logo-img-wrap {
      display: inline-block;
      background: white;
      border-radius: 16px;
      padding: 16px 28px;
      box-shadow:
        0 4px 30px rgba(180,100,220,0.13),
        0 1px 0 rgba(255,255,255,0.9) inset,
        0 0 0 1px rgba(176,120,210,0.14);
      margin-bottom: 18px;
    }

    .logo-img {
      width: 660px;
      max-width: 80vw;
      height: auto;
      display: block;
    }

    .brand-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 0 auto;
      width: fit-content;
    }
    .divider-line {
      width: 44px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-light));
    }
    .divider-line.r {
      background: linear-gradient(90deg, var(--purple-light), transparent);
    }
    .divider-gem {
      width: 5px; height: 5px;
      background: var(--purple-main);
      transform: rotate(45deg);
      box-shadow: 0 0 6px rgba(181,101,208,0.5);
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px 36px;
      width: 100%; max-width: 460px;
      box-shadow: var(--shadow-card);
      animation: riseIn 0.9s cubic-bezier(.22,.68,0,1.2) 0.15s both;
      position: relative; overflow: hidden;
    }

    /* Top shimmer line */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg,
        transparent,
        var(--purple-light) 20%,
        var(--purple-main) 50%,
        var(--purple-light) 80%,
        transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Watermark */
    .card::after {
      content: 'S';
      position: absolute; bottom: -30px; right: -8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 200px; font-weight: 600; font-style: italic;
      color: rgba(181,101,208,0.04);
      pointer-events: none; user-select: none; line-height: 1;
    }

    /* Card header */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .card-eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--purple-main);
      margin-bottom: 10px;
    }
    .card-eyebrow::before, .card-eyebrow::after {
      content: ''; width: 16px; height: 1px;
      background: var(--purple-light);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 400;
      color: var(--charcoal); letter-spacing: 0.5px;
    }
    .card-title em {
      font-style: italic; color: var(--purple-main);
    }

    .card-subtitle {
      margin-top: 7px;
      font-size: 14px; font-weight: 400;
      letter-spacing: 0.3px; color: var(--text-muted);
    }

    /* ── Field ── */
    .field-label {
      display: block;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 9px;
    }

    .select-wrapper { position: relative; }

    .select-wrapper::after {
      content: '';
      position: absolute; right: 16px; top: 46%;
      transform: translateY(-50%) rotate(45deg);
      width: 7px; height: 7px;
      border-right: 1.5px solid var(--purple-main);
      border-bottom: 1.5px solid var(--purple-main);
      pointer-events: none;
    }

    select {
      width: 100%;
      padding: 13px 44px 13px 16px;
      background: var(--soft-lilac);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-body);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 15.5px; font-weight: 400;
      outline: none; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    select option { background: #fff; color: var(--text-body); }

    select:focus {
      border-color: var(--purple-main);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(181,101,208,0.12);
    }
    select:hover { border-color: var(--border-mid); }

    /* ── Button ── */
    .btn {
      width: 100%; margin-top: 14px;
      padding: 14px 20px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--purple-glow) 0%, var(--purple-deep) 100%);
      color: #fff;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 24px rgba(181,101,208,0.40);
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.20) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-arrow {
      display: inline-block;
      width: 20px; height: 1px;
      background: rgba(255,255,255,0.65);
      position: relative;
      transition: width 0.25s;
    }
    .btn-arrow::after {
      content: '';
      position: absolute; right: 0; top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 6px; height: 6px;
      border-right: 1.5px solid rgba(255,255,255,0.8);
      border-top: 1.5px solid rgba(255,255,255,0.8);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 34px rgba(181,101,208,0.52);
    }
    .btn:hover .btn-arrow { width: 28px; }
    .btn:active { transform: translateY(0); }

    /* ── Section divider ── */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 22px;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .section-divider-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .gem-xs {
      width: 4px; height: 4px;
      background: var(--purple-light);
      transform: rotate(45deg);
      display: inline-block;
    }

    /* ── Notice ── */
    .notice-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 9px;
    }
    .notice-icon {
      width: 15px; height: 15px;
      border: 1.5px solid var(--purple-light);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-style: italic;
      color: var(--purple-main); flex-shrink: 0;
      font-family: 'Cormorant Garamond', serif;
    }

    textarea {
      width: 100%;
      padding: 13px 15px;
      background: var(--soft-lilac);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-body);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 15px; line-height: 1.75;
      resize: vertical; min-height: 96px;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      box-sizing: border-box;
    }
    textarea:focus {
      border-color: var(--purple-main);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(181,101,208,0.10);
    }
    textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

    /* ── Footer ── */
    .footer {
      margin-top: 28px; text-align: center;
      animation: riseIn 0.9s ease 0.4s both;
    }
    .footer-ornament {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; margin-bottom: 8px;
    }
    .footer-bar { width: 22px; height: 1px; background: var(--silver); }
    .footer-gem { width: 4px; height: 4px; background: var(--silver); transform: rotate(45deg); }
    .footer-text {
      font-size: 10px; font-weight: 400;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Animation ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

        <div class="divider-line"></div>

      </div>

    <!-- Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Sale Order <em>Form</em></div>
        <div class="card-subtitle">Chọn nhân viên và nhấn GO để tiếp tục</div>
      </div>

      <label class="field-label">Nhân viên</label>
      <div class="select-wrapper">
        <select id="nameSelect">
          <option value="">— Chọn nhân viên —</option>
        </select>
      </div>
      <button class="btn" onclick="goPage()">
        <span class="btn-inner">
          <span>GO</span>
          <span class="btn-arrow"></span>
        </span>
      </button>

      <div class="section-divider">
        <div class="section-divider-label">
          <span class="gem-xs"></span>
          Thông báo
          <span class="gem-xs"></span>
        </div>
      </div>

      <div class="notice-label">
        <span class="notice-icon">i</span>
        Nội dung
      </div>
      <textarea id="notice" placeholder="Đang tải thông báo..."></textarea>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-ornament">
        <div class="footer-bar"></div>
        <div class="footer-gem"></div>
        <div class="footer-bar"></div>
      </div>
      <div class="footer-text">© Skyline Beauty Supply — Sales Portal</div>
    </div>

  </div>

  <script>
    let pages = {};

    fetch('pages.json?v=' + new Date().getTime())
      .then(res => res.json())
      .then(data => {
        pages = data;
        const select = document.getElementById('nameSelect');
        Object.keys(pages).forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name.charAt(0).toUpperCase() + name.slice(1);
          select.appendChild(opt);
        });
      })
      .catch(err => console.error('Không load được pages.json', err));

    fetch('notice.txt?v=' + new Date().getTime())
      .then(res => res.text())
      .then(data => {
        document.getElementById('notice').value = data;
      })
      .catch(err => console.error('Không load được notice.txt', err));

    function goPage() {
      const val = document.getElementById('nameSelect').value;
      if (!val) { alert("Hãy chọn tên trước nha!"); return; }
      if (!pages[val]) { alert("Link chưa có cho nhân viên này!"); return; }
      window.open(pages[val], "_blank");
    }
  </script>
